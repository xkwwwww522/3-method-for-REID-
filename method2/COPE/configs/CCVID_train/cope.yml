MODEL:
  NAME: 'ViT-B-16'
  STRIDE_SIZE: [16, 16]
  MEMORY_MOMENTUM: 0.2
  SIE_CAMERA: True

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5
  RE_PROB: 0.5
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATALOADER:
  NUM_INSTANCE: 2
  NUM_WORKERS: 4

SOLVER:
  SEED: 1234
  MARGIN: 0.3
  K1: 200
  K2: 5
  CONTEXT_NUM: 4
  OCCLUSION_NUM: 20
  USED_OCCLUSION_NUM: 2
  STAGE1:
    IMS_PER_BATCH: 32
    OPTIMIZER_NAME: "Adam"
    BASE_LR: 4e-2
    WARMUP_LR_INIT: 1e-5
    LR_MIN: 1e-6
    WARMUP_METHOD: 'linear'
    WEIGHT_DECAY: 1e-4
    WEIGHT_DECAY_BIAS: 1e-4
    MAX_EPOCHS: 60
    CHECKPOINT_PERIOD: 10
    LOG_PERIOD: 50
    WARMUP_EPOCHS: 5
    EVAL_PERIOD: 10
    PRETRAINED_PATH: '/root/shared-nvme/REID/COPE/logs/ccvid_train/ViT-B-16pre_60.pth'
  IMS_PER_BATCH: 32
  OPTIMIZER_NAME: "SGD"
  BASE_LR: 3.5e-4
  WARMUP_METHOD: 'linear'
  WARMUP_ITERS: 10
  WARMUP_FACTOR: 0.1
  WEIGHT_DECAY: 5.0e-4
  MAX_EPOCHS: 100
  CHECKPOINT_PERIOD: 20
  LOG_PERIOD: 50
  EVAL_PERIOD: 20
  STEPS: [40, 70]
  GAMMA: 0.1

TEST:
  EVAL: True
  IMS_PER_BATCH: 128
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'after'
  FEAT_NORM: 'yes'
  USE_P_SCORE: True

DATASETS:
  NAMES: ('ccvid')
  ROOT_DIR: ('/root/shared-nvme/REID/COPE/data')

OUTPUT_DIR: './logs/ccvid_train/'
