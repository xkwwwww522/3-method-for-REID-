    IMS_PER_BATCH: 64
  STAGE2:
    IMS_PER_BATCH: 64

TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: True
  WEIGHT: '/root/autodl-tmp/ylma/REID/output/v4_multiscale/ViT-B-16_40.pth'
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

DATASETS:
  NAMES: ('move')
