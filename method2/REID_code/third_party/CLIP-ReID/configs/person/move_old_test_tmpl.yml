MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'ViT-B-16'
  STRIDE_SIZE: [16, 16]
  LORA_R: __LORA_R__
INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  RE_PROB: 0.5
  RE_MIN_AREA: 0.02
  RE_MAX_AREA: 0.40
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]
  USE_RRC: False
  RANDOM_GRAYSCALE: 0.0
DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8
SOLVER:
  STAGE1: {IMS_PER_BATCH: 64}
  STAGE2: {IMS_PER_BATCH: 64}
TEST:
  EVAL: True
  IMS_PER_BATCH: 64
  RE_RANKING: False
  WEIGHT: '__WEIGHT__'
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'
DATASETS:
  NAMES: ('move')
  ROOT_DIR: ('/root/autodl-tmp/ylma/REID/data')
OUTPUT_DIR: '/tmp/__OUT__'
